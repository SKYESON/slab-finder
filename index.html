<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signorino Slab Range Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--stone:#c8bfb0;--dark:#1a1816;--mid:#2e2b27;--light:#f5f2ee;--accent:#8b7355;--text:#3a3530;--muted:#8a8077;--border:#e2ddd6}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Montserrat",sans-serif;background:var(--light);color:var(--text);min-height:100vh}
  header{background:var(--dark);padding:28px 40px 24px;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,.3)}
  .header-inner{max-width:1600px;margin:0 auto;display:flex;align-items:flex-end;gap:40px;flex-wrap:wrap}
  .brand h1{font-family:"Cormorant Garamond",serif;font-size:1.7rem;font-weight:300;color:var(--stone);letter-spacing:.12em;text-transform:uppercase}
  .brand p{font-size:.6rem;color:var(--muted);letter-spacing:.25em;text-transform:uppercase;margin-top:4px}
  .filters{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;flex:1}
  .filter-group{display:flex;flex-direction:column;gap:5px}
  .filter-group label{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
  select,input[type=text]{background:var(--mid);border:1px solid #3d3830;color:var(--stone);padding:8px 14px;font-family:"Montserrat",sans-serif;font-size:.75rem;min-width:155px;outline:none;appearance:none;border-radius:2px}
  select:focus,input:focus{border-color:var(--accent)}
  .search-wrap{position:relative}
  .search-wrap input{padding-right:34px;min-width:210px}
  .search-icon{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
  .result-count{font-size:.62rem;color:var(--muted);letter-spacing:.1em;align-self:flex-end;padding-bottom:10px;white-space:nowrap}
  .btn-reset{background:transparent;border:1px solid #3d3830;color:var(--muted);padding:8px 16px;font-family:"Montserrat",sans-serif;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .2s;align-self:flex-end}
  .btn-reset:hover{border-color:var(--accent);color:var(--stone)}
  main{max-width:1600px;margin:0 auto;padding:36px 40px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:22px}
  .card{background:#fff;border:1px solid var(--border);border-radius:3px;overflow:hidden;cursor:pointer;transition:transform .25s,box-shadow .25s}
  .card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.14)}
  .card-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:var(--border)}
  .card-body{padding:13px 15px 15px}
  .card-name{font-family:"Cormorant Garamond",serif;font-size:1.05rem;font-weight:400;letter-spacing:.04em;color:var(--text);margin-bottom:7px;line-height:1.2}
  .card-type{font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:2px}
  .pills{display:flex;gap:5px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;padding:3px 7px;border-radius:2px;background:var(--light);color:var(--muted);border:1px solid var(--border)}
  .pill-type{background:#1f3864;color:#fff;border-color:#1f3864}
  .pill-origin{background:#5a4a3a;color:#fff;border-color:#5a4a3a}
  .pill-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.1)}
  .empty{grid-column:1/-1;text-align:center;padding:80px 40px;color:var(--muted)}
  .empty h2{font-family:"Cormorant Garamond",serif;font-size:2rem;font-weight:300;margin-bottom:10px;color:var(--stone)}
  .empty p{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase}
  .lightbox{display:none;position:fixed;inset:0;background:rgba(20,18,16,.92);z-index:1000;align-items:center;justify-content:center;padding:20px}
  .lightbox.open{display:flex}
  .lb-content{background:#fff;max-width:860px;width:100%;max-height:92vh;overflow-y:auto;border-radius:3px}
  .lb-img{width:100%;height:62vh;object-fit:cover;object-position:center 20%;display:block}
  .lb-body{padding:22px 26px 26px}
  .lb-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
  .lb-name{font-family:"Cormorant Garamond",serif;font-size:1.9rem;font-weight:300;letter-spacing:.08em;text-transform:uppercase;color:var(--text);line-height:1.1}
  .lb-close{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--muted);padding:4px 8px;line-height:1;transition:color .2s;flex-shrink:0}
  .lb-close:hover{color:var(--text)}
  .lb-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .lb-actions{display:flex;gap:10px;flex-wrap:wrap}
  .btn-stock{display:inline-flex;align-items:center;gap:8px;background:var(--dark);color:var(--stone);padding:10px 20px;border:none;border-radius:2px;font-family:"Montserrat",sans-serif;font-size:.66rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:background .2s}
  .btn-stock:hover{background:var(--accent);color:#fff}
  @media(max-width:768px){header{padding:18px 18px 14px}main{padding:20px 14px}.grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px}.lb-name{font-size:1.4rem}}

  </style>

(function(){

<body>
<header>
  <div class="header-inner">
    <div class="brand"><h1>Signorino</h1><p>Slab Range Finder</p></div>
    <div class="filters">
      <div class="filter-group">
        <label>Search</label>
        <div class="search-wrap">
          <input type="text" id="searchInput" placeholder="e.g. Verde, Travertine…">
          <span class="search-icon">&#x2315;</span>
        </div>
      </div>
      <div class="filter-group">
        <label>Base Colour</label>
        <select id="baseFilter"><option value="">All Base Colours</option></select>
      </div>
      <div class="filter-group">
        <label>Vein Colour</label>
        <select id="veinFilter"><option value="">All Vein Colours</option></select>
      </div>
      <div class="filter-group">
        <label>Type</label>
        <select id="typeFilter"><option value="">All Types</option></select>
      </div>
      <button class="btn-reset" onclick="resetFilters()">Clear</button>
      <div class="result-count" id="resultCount"></div>
    </div>
  </div>
</header>
<main><div class="grid" id="grid"></div></main>
<div class="lightbox" id="lightbox">
  <div class="lb-content">
    <img class="lb-img" id="lbImg" src="" alt="">
    <div class="lb-body">
      <div class="lb-top">
        <div class="lb-name" id="lbName"></div>
        <button class="lb-close" id="lbClose">&#x2715;</button>
      </div>
      <div class="lb-pills" id="lbPills"></div>
    </div>
  </div>
</div>

slabs.forEach((s,i)=>s._id=i);
function dot(c){return`<span class="pill-dot" style="background:${CM[c]||"#ccc"}"></span>`}
function slug(n){return n.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"")}
function card(s){return`<div class="card" onclick="openLB(${s._id})"><img class="card-img" src="${s.img}" alt="${s.name.replace(/"/g,"&quot;")}"><div class="card-body"><div class="card-name">${s.name}</div><div class="pills"><span class="pill">${dot(s.base)}${s.base}</span>${s.vein&&s.vein!=="None"?`<span class="pill">${dot(s.vein)}${s.vein}</span>`:""}</div></div>${s.type?`<div class="card-type">${s.type}</div>`:""}</div>`}
function openLB(id){
  const s=slabs[id];
  const imgEl=document.getElementById("lbImg");
  if(s.img){imgEl.src=s.img;imgEl.style.display='block';}
  else{imgEl.src='';imgEl.style.display='none';}
  document.getElementById("lbName").textContent=s.name;
  document.getElementById("lbPills").innerHTML=
    `<span class="pill">${dot(s.base)} Base: ${s.base}</span>`+
    (s.vein&&s.vein!=="None"&&s.vein?`<span class="pill">${dot(s.vein)} Vein: ${s.vein}</span>`:"")+
    (s.type?`<span class="pill pill-type">&#9670; ${s.type}</span>`:"")+
    (s.origin?`<span class="pill pill-origin">&#9654; ${s.origin}</span>`:"");
  document.getElementById("lightbox").classList.add("open");
}
document.getElementById("lbClose").onclick=()=>document.getElementById("lightbox").classList.remove("open");
document.getElementById("lightbox").onclick=function(e){if(e.target===this)this.classList.remove("open")};
document.addEventListener("keydown",e=>{if(e.key==="Escape")document.getElementById("lightbox").classList.remove("open")});
const baseEl=document.getElementById("baseFilter"),veinEl=document.getElementById("veinFilter");
[...new Set(slabs.map(s=>s.base))].sort().forEach(b=>{const o=document.createElement("option");o.value=b;o.textContent=b;baseEl.appendChild(o)});
[...new Set(slabs.map(s=>s.vein))].sort().forEach(v=>{const o=document.createElement("option");o.value=v;o.textContent=v;veinEl.appendChild(o)});
const typeEl=document.getElementById("typeFilter");
[...new Set(slabs.map(s=>s.type).filter(t=>t))].sort().forEach(t=>{const o=document.createElement("option");o.value=t;o.textContent=t;typeEl.appendChild(o)});
function filter(){
  const q=document.getElementById("searchInput").value.toLowerCase().trim(),b=baseEl.value,v=veinEl.value;
  const t=typeEl?typeEl.value:'';const f=slabs.filter(s=>(!q||s.name.toLowerCase().includes(q))&&(!b||s.base===b)&&(!v||s.vein===v)&&(!t||s.type===t));
  document.getElementById("resultCount").textContent=`${f.length} of ${slabs.length} ranges`;
  document.getElementById("grid").innerHTML=f.length?f.map(card).join(""):`<div class="empty"><h2>No results</h2><p>Try adjusting your filters</p></div>`;
}
function resetFilters(){document.getElementById("searchInput").value="";baseEl.value="";veinEl.value="";if(typeEl)typeEl.value="";filter()}
document.getElementById("searchInput").addEventListener("input",filter);
baseEl.addEventListener("change",filter);
veinEl.addEventListener("change",filter);
typeEl.addEventListener("change",filter);
filter();
function applyImages(){
  if(!window.SLAB_IMAGES)return;
  slabs.forEach(s=>{if(window.SLAB_IMAGES[s.name])s.img=window.SLAB_IMAGES[s.name];});
  filter();
}
// Also try applying once DOM is fully loaded
document.addEventListener('DOMContentLoaded',function(){
  if(window.SLAB_IMAGES)applyImages();
});
